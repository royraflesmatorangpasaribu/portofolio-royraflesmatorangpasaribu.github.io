    <circle cx="352" cy="239" r="16" fill="#22c55e"/>
    <text x="346" y="245" fill="#fff" font-size="16">@</text>
    <text x="382" y="234" fill="#1c1917" font-size="16" font-weight="700">Email Notification</text>
    <text x="382" y="256" fill="#57534e" font-size="13">Audit alert terkirim · status OK</text>

    <rect x="320" y="282" width="430" height="62" rx="10" fill="#ffffff" opacity="0.95"/>
    <circle cx="352" cy="313" r="16" fill="#0ea5e9"/>
    <path d="M345 313 l14 -5 -4 12 -4 -5z" fill="#fff"/>
    <text x="382" y="308" fill="#1c1917" font-size="16" font-weight="700">Telegram Bot</text>
    <text x="382" y="330" fill="#57534e" font-size="13">Pelaporan otomatis real-time</text>

    <rect x="320" y="356" width="430" height="62" rx="10" fill="#ffffff" opacity="0.95"/>
    <circle cx="352" cy="387" r="16" fill="#f59e0b"/>
    <text x="346" y="393" fill="#fff" font-size="18" font-weight="800">⚙</text>
    <text x="382" y="382" fill="#1c1917" font-size="16" font-weight="700">Java Service</text>
    <text x="382" y="404" fill="#57534e" font-size="13">Kebutuhan audit &amp; compliance</text>
