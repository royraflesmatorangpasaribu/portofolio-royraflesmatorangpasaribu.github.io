<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgWns" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgWns)"/>
  <circle cx="690" cy="100" r="150" fill="#ffffff" opacity="0.05"/>
  <circle cx="120" cy="440" r="120" fill="#ffffff" opacity="0.05"/>

  <text x="50" y="70" fill="#fcd34d" font-size="20" font-weight="700" letter-spacing="2">BANK LAMPUNG · NOTIFLOW</text>
  <text x="50" y="120" fill="#ffffff" font-size="44" font-weight="800">WNS</text>
  <text x="50" y="152" fill="#fde68a" font-size="20">Warning Notification System</text>
  <rect x="50" y="170" width="90" height="4" rx="2" fill="#fbbf24"/>

  <!-- Big bell icon -->
  <g transform="translate(95,230)">
    <circle cx="60" cy="90" r="92" fill="#ffffff" opacity="0.08"/>
    <path d="M60 30 a40 40 0 0 1 40 40 v28 l16 22 h-112 l16 -22 v-28 a40 40 0 0 1 40 -40z" fill="#fbbf24"/>
