<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgSkripsi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#155e75"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="nodeSkripsi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgSkripsi)"/>
  <circle cx="700" cy="90" r="150" fill="#ffffff" opacity="0.05"/>
  <circle cx="110" cy="440" r="120" fill="#ffffff" opacity="0.05"/>

  <text x="50" y="68" fill="#a5f3fc" font-size="20" font-weight="700" letter-spacing="2">ILMU KOMPUTER · UNILA</text>
  <text x="50" y="116" fill="#ffffff" font-size="42" font-weight="800">Alur Skripsi</text>
  <text x="50" y="148" fill="#cffafe" font-size="20">Panduan Tahapan Tugas Akhir</text>
  <rect x="50" y="166" width="90" height="4" rx="2" fill="#22d3ee"/>

  <!-- Flow path -->
  <path d="M120 280 H260 M380 280 H520 M640 280 H700" stroke="#a5f3fc" stroke-width="4" stroke-dasharray="8 8" fill="none" opacity="0.6"/>
  <path d="M120 280 C 200 280, 200 390, 300 390 H 520" stroke="#a5f3fc" stroke-width="4" stroke-dasharray="8 8" fill="none" opacity="0.4"/>

  <!-- Step nodes -->
  <g>
    <!-- Step 1 -->
    <circle cx="120" cy="280" r="42" fill="url(#nodeSkripsi)"/>
    <text x="120" y="289" fill="#06281f" font-size="26" font-weight="800" text-anchor="middle">1</text>
    <text x="120" y="350" fill="#cffafe" font-size="14" text-anchor="middle" font-weight="600">Proposal</text>

    <!-- Step 2 -->
    <circle cx="320" cy="280" r="42" fill="url(#nodeSkripsi)"/>
    <text x="320" y="289" fill="#06281f" font-size="26" font-weight="800" text-anchor="middle">2</text>
    <text x="320" y="350" fill="#cffafe" font-size="14" text-anchor="middle" font-weight="600">Seminar</text>

    <!-- Step 3 -->
    <circle cx="560" cy="280" r="42" fill="url(#nodeSkripsi)"/>
    <text x="560" y="289" fill="#06281f" font-size="26" font-weight="800" text-anchor="middle">3</text>
    <text x="560" y="350" fill="#cffafe" font-size="14" text-anchor="middle" font-weight="600">Penelitian</text>

    <!-- Step 4 (final) -->
    <circle cx="710" cy="390" r="46" fill="#fde047"/>
    <path d="M690 388 l13 14 24 -28" fill="none" stroke="#155e75" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="710" y="460" fill="#fef9c3" font-size="14" text-anchor="middle" font-weight="700">Sidang Akhir</text>
  </g>

  <!-- Web/info icon top right -->
  <g transform="translate(560,80)">
    <rect x="0" y="0" width="180" height="120" rx="12" fill="#ffffff" opacity="0.1"/>
    <rect x="0" y="0" width="180" height="28" rx="12" fill="#ffffff" opacity="0.15"/>
    <rect x="0" y="16" width="180" height="12" fill="#ffffff" opacity="0.15"/>
    <circle cx="16" cy="14" r="4" fill="#fca5a5"/>
    <circle cx="30" cy="14" r="4" fill="#fde047"/>
    <circle cx="44" cy="14" r="4" fill="#86efac"/>
    <rect x="18" y="46" width="100" height="9" rx="4" fill="#cffafe"/>
    <rect x="18" y="64" width="144" height="9" rx="4" fill="#a5f3fc" opacity="0.7"/>
    <rect x="18" y="82" width="120" height="9" rx="4" fill="#a5f3fc" opacity="0.7"/>
    <rect x="18" y="100" width="60" height="9" rx="4" fill="#a5f3fc" opacity="0.7"/>
  </g>
</svg>
