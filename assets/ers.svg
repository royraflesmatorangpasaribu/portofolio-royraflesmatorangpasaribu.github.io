<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgErs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgErs)"/>
  <circle cx="700" cy="90" r="150" fill="#ffffff" opacity="0.05"/>
  <circle cx="110" cy="440" r="120" fill="#ffffff" opacity="0.05"/>

  <text x="50" y="70" fill="#c4b5fd" font-size="20" font-weight="700" letter-spacing="2">BANK LAMPUNG</text>
  <text x="50" y="120" fill="#ffffff" font-size="44" font-weight="800">ERS</text>
  <text x="50" y="152" fill="#ddd6fe" font-size="20">Electronic Regulation System</text>
  <rect x="50" y="170" width="90" height="4" rx="2" fill="#a78bfa"/>

  <!-- Document stack -->
  <g transform="translate(70,210)">
    <rect x="30" y="30" width="200" height="250" rx="12" fill="#ffffff" opacity="0.25"/>
    <rect x="15" y="15" width="200" height="250" rx="12" fill="#ffffff" opacity="0.5"/>
    <rect x="0" y="0" width="200" height="250" rx="12" fill="#ffffff"/>
    <!-- doc header -->
    <rect x="0" y="0" width="200" height="50" rx="12" fill="#7c3aed"/>
    <rect x="0" y="30" width="200" height="20" fill="#7c3aed"/>
    <text x="20" y="32" fill="#fff" font-size="15" font-weight="700">Regulasi</text>
    <!-- doc lines -->
    <rect x="20" y="72" width="160" height="10" rx="5" fill="#ddd6fe"/>
    <rect x="20" y="94" width="130" height="10" rx="5" fill="#e9d5ff"/>
    <rect x="20" y="116" width="160" height="10" rx="5" fill="#ddd6fe"/>
    <rect x="20" y="138" width="100" height="10" rx="5" fill="#e9d5ff"/>
    <!-- check stamp -->
    <circle cx="150" cy="200" r="32" fill="#22c55e"/>
    <path d="M136 200 l10 11 19 -22" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Feature list -->
  <g>
    <rect x="430" y="215" width="320" height="200" rx="14" fill="#ffffff" opacity="0.08"/>
    <text x="455" y="252" fill="#ddd6fe" font-size="18" font-weight="700">Compliance Workflow</text>
    <g fill="#ede9fe" font-size="15">
      <circle cx="463" cy="288" r="5" fill="#a78bfa"/>
      <text x="480" y="293">Dokumentasi regulasi digital</text>
      <circle cx="463" cy="322" r="5" fill="#a78bfa"/>
      <text x="480" y="327">Proses persetujuan &amp; audit</text>
      <circle cx="463" cy="356" r="5" fill="#a78bfa"/>
      <text x="480" y="361">Tracking kebijakan internal</text>
      <circle cx="463" cy="390" r="5" fill="#a78bfa"/>
      <text x="480" y="395">Riwayat versi &amp; arsip</text>
    </g>
  </g>
</svg>
