<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGebang" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="cylGebang" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgGebang)"/>
  <circle cx="700" cy="90" r="150" fill="#ffffff" opacity="0.05"/>
  <circle cx="110" cy="450" r="120" fill="#ffffff" opacity="0.05"/>

  <text x="50" y="66" fill="#6ee7b7" font-size="19" font-weight="700" letter-spacing="1.5">DESA GEBANG · PESAWARAN</text>
  <text x="50" y="112" fill="#ffffff" font-size="38" font-weight="800">Population Database</text>
  <text x="50" y="142" fill="#d1fae5" font-size="19">Sistem Data Kependudukan Desa</text>
  <rect x="50" y="160" width="90" height="4" rx="2" fill="#34d399"/>

  <!-- Database cylinder -->
  <g transform="translate(95,210)">
    <ellipse cx="80" cy="170" rx="80" ry="22" fill="#059669"/>
    <rect x="0" y="40" width="160" height="130" fill="url(#cylGebang)"/>
    <ellipse cx="80" cy="170" rx="80" ry="22" fill="#10b981"/>
    <ellipse cx="80" cy="110" rx="80" ry="22" fill="#34d399"/>
    <ellipse cx="80" cy="40" rx="80" ry="22" fill="#6ee7b7"/>
    <ellipse cx="80" cy="40" rx="80" ry="22" fill="none" stroke="#a7f3d0" stroke-width="2"/>
    <text x="80" y="100" fill="#064e3b" font-size="22" font-weight="800" text-anchor="middle">DB</text>
  </g>

  <!-- Stat cards -->
  <g>
    <rect x="320" y="200" width="200" height="86" rx="12" fill="#ffffff" opacity="0.12"/>
    <text x="340" y="232" fill="#a7f3d0" font-size="14">Total Penduduk</text>
    <text x="340" y="268" fill="#ffffff" font-size="30" font-weight="800">6.604</text>

    <rect x="540" y="200" width="210" height="86" rx="12" fill="#ffffff" opacity="0.12"/>
    <text x="560" y="232" fill="#a7f3d0" font-size="14">Kepala Keluarga</text>
    <text x="560" y="268" fill="#ffffff" font-size="30" font-weight="800">1.896</text>

    <rect x="320" y="300" width="200" height="86" rx="12" fill="#ffffff" opacity="0.12"/>
    <text x="340" y="332" fill="#93c5fd" font-size="14">♂ Laki-laki</text>
    <text x="340" y="368" fill="#bfdbfe" font-size="30" font-weight="800">3.409</text>

    <rect x="540" y="300" width="210" height="86" rx="12" fill="#ffffff" opacity="0.12"/>
    <text x="560" y="332" fill="#fbcfe8" font-size="14">♀ Perempuan</text>
    <text x="560" y="368" fill="#fbcfe8" font-size="30" font-weight="800">3.195</text>
  </g>

  <text x="320" y="424" fill="#d1fae5" font-size="15">Mendukung administrasi desa &amp; pengelolaan data demografi</text>
</svg>
